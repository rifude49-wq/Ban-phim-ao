<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bàn phím Tiếng Việt Hoàn Chỉnh</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; background: #2c3e50; margin: 0; }
        #display { 
            width: 90%; min-height: 100px; font-size: 22px; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; background: white; word-wrap: break-word; white-space: pre-wrap;
            overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .keyboard { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 550px; }
        .row { display: flex; justify-content: center; gap: 4px; }
        button { 
            flex: 1; height: 45px; border: none; border-radius: 6px; background: white; 
            font-weight: bold; font-size: 14px; box-shadow: 0 3px #95a5a6;
        }
        button:active { background: #f1c40f; transform: translateY(2px); box-shadow: none; }
        
        /* Màu cho các loại phím */
        .mark-key { background: #ffeb3b; color: #000; } /* Phím dấu */
        .vn-key { background: #e8f8f5; color: #16a085; } /* Ă Â Ê... */
        .backspace { background: #e74c3c; color: white; flex: 1.5; }
        .space { flex: 4; background: #ecf0f1; }
    </style>
</head>
<body>

    <h3 style="color: white;">BÀN PHÍM CÓ DẤU</h3>
    <div id="display"></div>

    <div class="keyboard">
        <div class="row">
            <button class="mark-key" onclick="addMark('sắc')">SẮC (´)</button>
            <button class="mark-key" onclick="addMark('huyền')">HUYỀN (`)</button>
            <button class="mark-key" onclick="addMark('hỏi')">HỎI (?)</button>
            <button class="mark-key" onclick="addMark('ngã')">NGÃ (~)</button>
            <button class="mark-key" onclick="addMark('nặng')">NẶNG (.)</button>
        </div>

        <div class="row">
            <button class="vn-key" onclick="addChar('Ă')">Ă</button>
            <button class="vn-key" onclick="addChar('Â')">Â</button>
            <button class="vn-key" onclick="addChar('Đ')">Đ</button>
            <button class="vn-key" onclick="addChar('Ê')">Ê</button>
            <button class="vn-key" onclick="addChar('Ô')">Ô</button>
            <button class="vn-key" onclick="addChar('Ơ')">Ơ</button>
            <button class="vn-key" onclick="addChar('Ư')">Ư</button>
        </div>
        
        <div class="row">
            <button onclick="addChar('Q')">Q</button><button onclick="addChar('W')">W</button><button onclick="addChar('E')">E</button><button onclick="addChar('R')">R</button><button onclick="addChar('T')">T</button><button onclick="addChar('Y')">Y</button><button onclick="addChar('U')">U</button><button onclick="addChar('I')">I</button><button onclick="addChar('O')">O</button><button onclick="addChar('P')">P</button>
        </div>
        <div class="row">
            <button onclick="addChar('A')">A</button><button onclick="addChar('S')">S</button><button onclick="addChar('D')">D</button><button onclick="addChar('F')">F</button><button onclick="addChar('G')">G</button><button onclick="addChar('H')">H</button><button onclick="addChar('J')">J</button><button onclick="addChar('K')">K</button><button onclick="addChar('L')">L</button>
            <button class="backspace" onclick="delChar()">XÓA</button>
        </div>
        <div class="row">
            <button style="flex:1" onclick="addChar('.')">.</button>
            <button class="space" onclick="addChar(' ')">DẤU CÁCH</button>
            <button style="flex:1; background:#9b59b6; color:white" onclick="document.body.style.background='#34495e'">MÀU</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // "Cuốn từ điển" ghép dấu
        const accentMap = {
            'A': { 'sắc': 'Á', 'huyền': 'À', 'hỏi': 'Ả', 'ngã': 'Ã', 'nặng': 'Ạ' },
            'a': { 'sắc': 'á', 'huyền': 'à', 'hỏi': 'ả', 'ngã': 'ã', 'nặng': 'ạ' },
            'E': { 'sắc': 'É', 'huyền': 'È', 'hỏi': 'Ẻ', 'ngã': 'Ẽ', 'nặng': 'Ẹ' },
            'e': { 'sắc': 'é', 'huyền': 'è', 'hỏi': 'ẻ', 'ngã': 'ẽ', 'nặng': 'ẹ' },
            'O': { 'sắc': 'Ó', 'huyền': 'Ò', 'hỏi': 'Ỏ', 'ngã': 'Õ', 'nặng': 'Ọ' },
            'o': { 'sắc': 'ó', 'huyền': 'ò', 'hỏi': 'ỏ', 'ngã': 'õ', 'nặng': 'ọ' },
            'U': { 'sắc': 'Ú', 'huyền': 'Ù', 'hỏi': 'Ủ', 'ngã': 'Ũ', 'nặng': 'Ụ' },
            'u': { 'sắc': 'ú', 'huyền': 'ù', 'hỏi': 'ủ', 'ngã': 'ũ', 'nặng': 'ụ' },
            'I': { 'sắc': 'Í', 'huyền': 'Ì', 'hỏi': 'Ỉ', 'ngã': 'Ĩ', 'nặng': 'Ị' },
            'i': { 'sắc': 'í', 'huyền': 'ì', 'hỏi': 'ỉ', 'ngã': 'ĩ', 'nặng': 'ị' },
            'Ă': { 'sắc': 'Ắ', 'huyền': 'Ằ', 'hỏi': 'Ẳ', 'ngã': 'Ẵ', 'nặng': 'Ặ' },
            'ă': { 'sắc': 'ắ', 'huyền': 'ằ', 'hỏi': 'ẳ', 'ngã': 'ẵ', 'nặng': 'ặ' },
            'Â': { 'sắc': 'Ấ', 'huyền': 'Ầ', 'hỏi': 'Ẩ', 'ngã': 'Ẫ', 'nặng': 'Ậ' },
            'â': { 'sắc': 'ấ', 'huyền': 'ầ', 'hỏi': 'ẩ', 'ngã': 'ẫ', 'nặng': 'ậ' },
            'Ê': { 'sắc': 'Ế', 'huyền': 'Ề', 'hỏi': 'Ể', 'ngã': 'Ễ', 'nặng': 'Ệ' },
            'ê': { 'sắc': 'ế', 'huyền': 'ề', 'hỏi': 'ể', 'ngã': 'ễ', 'nặng': 'ệ' },
            'Ô': { 'sắc': 'Ố', 'huyền': 'Ồ', 'hỏi': 'Ổ', 'ngã': 'Ỗ', 'nặng': 'Ộ' },
            'ô': { 'sắc': 'ố', 'huyền': 'ồ', 'hỏi': 'ổ', 'ngã': 'ỗ', 'nặng': 'ộ' },
            'Ơ': { 'sắc': 'Ớ', 'huyền': 'Ờ', 'hỏi': 'Ở', 'ngã': 'Ỡ', 'nặng': 'Ợ' },
            'ơ': { 'sắc': 'ớ', 'huyền': 'ờ', 'hỏi': 'ở', 'ngã': 'ỡ', 'nặng': 'ợ' },
            'Ư': { 'sắc': 'Ứ', 'huyền': 'Ừ', 'hỏi': 'Ử', 'ngã': 'Ữ', 'nặng': 'Ự' },
            'ư': { 'sắc': 'ứ', 'huyền': 'ừ', 'hỏi': 'ử', 'ngã': 'ữ', 'nặng': 'ự' }
        };

        function addChar(char) {
            if (navigator.vibrate) navigator.vibrate(40);
            let text = display.innerText;
            const shouldCapitalize = (text === "" || /\. +$/.test(text) || text.endsWith("."));
            display.innerText += shouldCapitalize ? char.toUpperCase() : char.toLowerCase();
            display.scrollTop = display.scrollHeight;
        }

        // Hàm xử lý dấu
        function addMark(type) {
            if (navigator.vibrate) navigator.vibrate(40);
            let text = display.innerText;
            if (text.length === 0) return;

            let lastChar = text.slice(-1); // Lấy chữ cuối cùng
            
            // Kiểm tra xem chữ cuối có trong "từ điển" không
            if (accentMap[lastChar] && accentMap[lastChar][type]) {
                // Thay thế chữ cuối bằng chữ có dấu
                display.innerText = text.slice(0, -1) + accentMap[lastChar][type];
            }
        }

        function delChar() {
            if (navigator.vibrate) navigator.vibrate(20);
            display.innerText = display.innerText.slice(0, -1);
        }
    </script>
</body>
</html>
