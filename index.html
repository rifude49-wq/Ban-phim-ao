<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bàn phím Pro Max</title>
    <style>
        /* CSS - Trang trí */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; background: #8e44ad; margin: 0; 
            transition: background 0.5s; /* Hiệu ứng đổi màu nền mượt mà */
        }
        
        h2 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        #display { 
            width: 90%; min-height: 100px; font-size: 22px; padding: 15px; 
            margin-bottom: 20px; border: none; border-radius: 15px; 
            background: white; word-wrap: break-word; white-space: pre-wrap; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .keyboard { 
            display: flex; flex-direction: column; gap: 10px; 
            width: 100%; max-width: 600px; background: rgba(255,255,255,0.2); 
            padding: 15px; border-radius: 20px; backdrop-filter: blur(10px);
        }

        .row { display: flex; justify-content: center; gap: 6px; }
        
        button { 
            flex: 1; height: 50px; border: none; border-radius: 8px; 
            background: #ffffff; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: all 0.1s; /* Làm hiệu ứng nhấn mượt hơn */
            box-shadow: 0 4px #bdc3c7;
        }

        /* Hiệu ứng khi nhấn vào phím */
        button:active { 
            background: #f1c40f !important; /* Đổi sang màu vàng khi chạm */
            box-shadow: 0 0px #95a5a6; 
            transform: translateY(4px); 
        }

        .space { flex: 5; background: #ecf0f1; }
        .backspace { flex: 2; background: #e74c3c; color: white; box-shadow: 0 4px #c0392b; }
        .clear-all { flex: 2; background: #f39c12; color: white; box-shadow: 0 4px #d35400; }
    </style>
</head>
<body>

    <h2>BÀN PHÍM THÔNG MINH</h2>
    <div id="display"></div>

    <div class="keyboard">
        <div class="row">
            <button onclick="addChar('1')">1</button><button onclick="addChar('2')">2</button><button onclick="addChar('3')">3</button><button onclick="addChar('4')">4</button><button onclick="addChar('5')">5</button><button onclick="addChar('6')">6</button><button onclick="addChar('7')">7</button><button onclick="addChar('8')">8</button><button onclick="addChar('9')">9</button><button onclick="addChar('0')">0</button>
        </div>
        <div class="row">
            <button onclick="addChar('Q')">Q</button><button onclick="addChar('W')">W</button><button onclick="addChar('E')">E</button><button onclick="addChar('R')">R</button><button onclick="addChar('T')">T</button><button onclick="addChar('Y')">Y</button><button onclick="addChar('U')">U</button><button onclick="addChar('I')">I</button><button onclick="addChar('O')">O</button><button onclick="addChar('P')">P</button>
        </div>
        <div class="row">
            <button onclick="addChar('A')">A</button><button onclick="addChar('S')">S</button><button onclick="addChar('D')">D</button><button onclick="addChar('F')">F</button><button onclick="addChar('G')">G</button><button onclick="addChar('H')">H</button><button onclick="addChar('J')">J</button><button onclick="addChar('K')">K</button><button onclick="addChar('L')">L</button>
        </div>
        <div class="row">
            <button onclick="addChar('Z')">Z</button><button onclick="addChar('X')">X</button><button onclick="addChar('C')">C</button><button onclick="addChar('V')">V</button><button onclick="addChar('B')">B</button><button onclick="addChar('N')">N</button><button onclick="addChar('M')">M</button>
            <button class="backspace" onclick="delChar()">XÓA</button>
        </div>
        <div class="row">
            <button class="clear-all" onclick="clearAll()">XÓA HẾT</button>
            <button class="space" onclick="addChar(' ')">DẤU CÁCH</button>
        </div>
    </div>

    <script>
        // JavaScript - Logic điều khiển
        const display = document.getElementById('display');
        
        function addChar(char) {
            // Nếu màn hình đang trống, tự động viết hoa (đây là logic thông minh)
            if (display.innerText === "") {
                display.innerText += char.toUpperCase();
            } else {
                display.innerText += char.toLowerCase();
            }
            display.scrollTop = display.scrollHeight;
        }
        
        function delChar() {
            display.innerText = display.innerText.slice(0, -1);
        }

        // Hàm mới để xóa tất cả
        function clearAll() {
            if(confirm("Bạn có chắc muốn xóa hết không?")) {
                display.innerText = "";
            }
        }
    </script>
</body>
</html>
