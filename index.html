<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bàn phím Pro Max V4</title>
    <style>
        body { 
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; padding: 20px; background: #2c3e50; 
            margin: 0; transition: background 0.4s; 
        }
        h2 { color: white; }
        #display { 
            width: 90%; min-height: 120px; font-size: 22px; padding: 15px; 
            margin-bottom: 20px; border-radius: 15px; background: white; 
            word-wrap: break-word; white-space: pre-wrap; overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .keyboard { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 600px; }
        .row { display: flex; justify-content: center; gap: 5px; }
        button { 
            flex: 1; height: 50px; border: none; border-radius: 8px; 
            background: white; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px #95a5a6; transition: 0.1s;
            touch-action: manipulation; /* Ngăn zoom khi bấm nhanh */
        }
        button:active { background: #f1c40f; transform: translateY(3px); box-shadow: none; }
        
        /* Màu sắc các nút đặc biệt */
        .btn-color { background: #9b59b6; color: white; }
        .backspace { background: #e74c3c; color: white; flex: 2; }
        .space { flex: 4; background: #ecf0f1; }
    </style>
</head>
<body>

    <h2 id="title">BÀN PHÍM ĐA NĂNG</h2>
    <div id="display"></div>

    <div class="keyboard">
        <div class="row">
            <button onclick="addChar('1')">1</button><button onclick="addChar('2')">2</button><button onclick="addChar('3')">3</button><button onclick="addChar('4')">4</button><button onclick="addChar('5')">5</button><button onclick="addChar('6')">6</button><button onclick="addChar('7')">7</button><button onclick="addChar('8')">8</button><button onclick="addChar('9')">9</button><button onclick="addChar('0')">0</button>
        </div>
        <div class="row">
            <button onclick="addChar('Q')">Q</button><button onclick="addChar('W')">W</button><button onclick="addChar('E')">E</button><button onclick="addChar('R')">R</button><button onclick="addChar('T')">T</button><button onclick="addChar('Y')">Y</button><button onclick="addChar('U')">U</button><button onclick="addChar('I')">I</button><button onclick="addChar('O')">O</button><button onclick="addChar('P')">P</button>
        </div>
        <div class="row">
            <button onclick="addChar('A')">A</button><button onclick="addChar('S')">S</button><button onclick="addChar('D')">D</button><button onclick="addChar('F')">F</button><button onclick="addChar('G')">G</button><button onclick="addChar('H')">H</button><button onclick="addChar('J')">J</button><button onclick="addChar('K')">K</button><button onclick="addChar('L')">L</button>
            <button style="background:#bdc3c7" onclick="addChar('.')">.</button>
        </div>
        <div class="row">
            <button onclick="addChar('Z')">Z</button><button onclick="addChar('X')">X</button><button onclick="addChar('C')">C</button><button onclick="addChar('V')">V</button><button onclick="addChar('B')">B</button><button onclick="addChar('N')">N</button><button onclick="addChar('M')">M</button>
            <button class="backspace" onclick="delChar()">XÓA</button>
        </div>
        <div class="row">
            <button class="btn-color" onclick="changeBg()">ĐỔI MÀU</button>
            <button class="space" onclick="addChar(' ')">SPACE</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // Hàm tạo âm thanh "tạch" ngắn
        function playClickSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, context.currentTime);
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(context.destination);
            osc.start();
            osc.stop(context.currentTime + 0.1);
        }

        function addChar(char) {
            // 1. Rung và Âm thanh
            if (navigator.vibrate) navigator.vibrate(40);
            playClickSound();

            let text = display.innerText;
            
            // 2. Sửa lỗi "2 dấu cách": Dùng Regex kiểm tra kết thúc bằng dấu chấm và bất kỳ số lượng khoảng trắng nào
            const shouldCapitalize = (text === "" || /\. +$/.test(text) || text.endsWith("."));

            if (shouldCapitalize) {
                display.innerText += char.toUpperCase();
            } else {
                display.innerText += char.toLowerCase();
            }
            
            display.scrollTop = display.scrollHeight;
        }

        function delChar() {
            if (navigator.vibrate) navigator.vibrate(20);
            display.innerText = display.innerText.slice(0, -1);
        }

        // Hàm đổi màu nền ngẫu nhiên
        function changeBg() {
            const colors = ['#1abc9c', '#3498db', '#9b59b6', '#e67e22', '#e74c3c', '#2c3e50', '#27ae60'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.background = randomColor;
        }
    </script>
</body>
</html>
