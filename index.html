<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bàn phím ảo của tôi</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        #display { width: 90%; height: 50px; font-size: 24px; margin-bottom: 20px; padding: 10px; border: 2px solid #333; border-radius: 8px; background: white; overflow-x: auto; white-space: nowrap; }
        .keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; width: 95%; max-width: 500px; background: #ccc; padding: 10px; border-radius: 10px; }
        button { height: 50px; border: none; border-radius: 5px; background: white; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #999; }
        button:active { background: #ddd; transform: translateY(2px); box-shadow: none; }
        .space { grid-column: span 10; height: 50px; background: #eee; }
        .backspace { grid-column: span 2; background: #ff9f9f; }
    </style>
</head>
<body>

    <div id="display"></div>

    <div class="keyboard">
        <button onclick="addChar('Q')">Q</button><button onclick="addChar('W')">W</button><button onclick="addChar('E')">E</button><button onclick="addChar('R')">R</button><button onclick="addChar('T')">T</button><button onclick="addChar('Y')">Y</button><button onclick="addChar('U')">U</button><button onclick="addChar('I')">I</button><button onclick="addChar('O')">O</button><button onclick="addChar('P')">P</button>
        <button onclick="addChar('A')">A</button><button onclick="addChar('S')">S</button><button onclick="addChar('D')">D</button><button onclick="addChar('F')">F</button><button onclick="addChar('G')">G</button><button onclick="addChar('H')">H</button><button onclick="addChar('J')">J</button><button onclick="addChar('K')">K</button><button onclick="addChar('L')">L</button>
        <button class="backspace" onclick="delChar()">←</button>
        <button class="space" onclick="addChar(' ')">SPACE (Dấu cách)</button>
    </div>

    <script>
        const display = document.getElementById('display');
        function addChar(char) { display.innerText += char; }
        function delChar() { display.innerText = display.innerText.slice(0, -1); }
    </script>
</body>
  </html>
